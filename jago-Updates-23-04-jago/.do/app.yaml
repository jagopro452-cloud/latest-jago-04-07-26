name: jago-platform
region: blr
databases:
  - name: jago-redis
    engine: REDIS
    version: "7"
    production: true
    size: db-s-1vcpu-1gb
services:
  - name: jago-server
    source_dir: /jago_app-main
    github:
      repo: jagopro452-cloud/jago
      branch: master
      deploy_on_push: true
    build_command: npm ci && npm run build
    run_command: npm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-s
    health_check:
      http_path: /api/health
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: "production"
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        type: SECRET
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        type: SECRET
      - key: FIREBASE_WEB_API_KEY
        type: SECRET
      - key: GOOGLE_MAPS_API_KEY
        type: SECRET
      - key: RAZORPAY_KEY_ID
        type: SECRET
      - key: RAZORPAY_KEY_SECRET
        type: SECRET
      - key: RAZORPAY_WEBHOOK_SECRET
        type: SECRET
      - key: ANTHROPIC_API_KEY
        type: SECRET
      - key: OPS_API_KEY
        type: SECRET
      - key: TWO_FACTOR_API_KEY
        type: SECRET
      - key: ADMIN_PASSWORD
        type: SECRET
      - key: ADMIN_RESET_KEY
        type: SECRET
      - key: ADMIN_EMAIL
        value: "kiranatmakuri518@gmail.com"
      - key: ADMIN_NAME
        value: "Jago Admin"
      - key: ADMIN_PASSWORD_SYNC_ON_RESTART
        value: "true"
      - key: ADMIN_SESSION_TTL_HOURS
        value: "24"
      - key: ADMIN_2FA_REQUIRED
        value: "false"
      - key: ENABLE_DEV_OTP_RESPONSES
        value: "false"
      - key: SOCKET_ALLOWED_ORIGINS
        value: "https://jagopro.org"
      - key: REDIS_URL
        value: ${jago-redis.REDIS_URL}
        type: SECRET
