name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e
            cd /var/www/jago
            git pull origin main
            npm ci --prefer-offline
            npm run build
            set -a && source /var/www/jago/.env && set +a
            pm2 restart jago --update-env || pm2 start dist/index.js --name jago --max-memory-restart 512M
            pm2 save
            sleep 5
            curl -sf http://localhost:5000/api/health && echo "Deploy OK" || echo "WARNING: health check failed"
