name: Build Flutter APKs

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Build Customer App
        run: |
          cd flutter_apps/customer_app
          flutter pub get
          flutter build apk --release

      - name: Build Driver App
        run: |
          cd flutter_apps/driver_app
          flutter pub get
          flutter build apk --release

      - name: Upload APKs
        uses: actions/upload-artifact@v3
        with:
          name: release-apks
          path: |
            flutter_apps/customer_app/build/app/outputs/flutter-apk/app-release.apk
            flutter_apps/driver_app/build/app/outputs/flutter-apk/app-release.apk