<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1920px; background:#060e22; font-family:'Segoe UI',Arial,sans-serif; overflow:hidden; position:relative; }
  .status-bar { height:60px; background:#060e22; display:flex; align-items:center; justify-content:space-between; padding:0 40px; }
  .status-time { color:#fff; font-size:28px; font-weight:600; }
  .status-icons { color:#fff; font-size:22px; }

  .header { padding:28px 40px; display:flex; align-items:center; justify-content:space-between; }
  .brand { display:flex; align-items:center; gap:16px; }
  .brand-name { font-size:40px; font-weight:900; color:#fff; letter-spacing:2px; }
  .brand-name span { color:#3B82F6; }
  .brand-tag { font-size:20px; color:#3B82F6; background:#0f1b3d; border-radius:12px; padding:8px 20px; border:1px solid #243060; }
  .online-toggle { background:#0a2a1a; border:3px solid #10b981; border-radius:50px; padding:20px 36px; display:flex; align-items:center; gap:16px; cursor:pointer; }
  .toggle-dot { width:28px; height:28px; background:#10b981; border-radius:50%; box-shadow:0 0 12px #10b981; }
  .toggle-text { font-size:26px; color:#10b981; font-weight:700; }

  /* earnings today */
  .earnings-card { margin:0 40px 28px; background:linear-gradient(135deg,#0f2855,#1a3a7a); border-radius:28px; padding:40px; border:1px solid #243060; }
  .earn-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
  .earn-title { font-size:26px; color:#8899bb; }
  .earn-date { font-size:22px; color:#8899bb; }
  .earn-amount { font-size:80px; color:#fff; font-weight:900; line-height:1; margin-bottom:8px; }
  .earn-sub { font-size:22px; color:#10b981; }
  .earn-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:28px; }
  .earn-stat { background:rgba(255,255,255,0.06); border-radius:16px; padding:20px; text-align:center; }
  .earn-stat-val { font-size:36px; color:#fff; font-weight:800; }
  .earn-stat-label { font-size:18px; color:#8899bb; margin-top:6px; }

  /* map mini */
  .map-area { margin:0 40px 28px; height:340px; background:linear-gradient(180deg,#0f2050,#1a3a6b); border-radius:24px; position:relative; overflow:hidden; border:1px solid #243060; }
  .map-content { position:absolute; inset:0; opacity:0.15; }
  .road-h { position:absolute; height:3px; background:#6aabff; width:100%; }
  .road-v { position:absolute; width:3px; background:#6aabff; height:100%; }
  .my-location { position:absolute; top:45%; left:48%; transform:translate(-50%,-50%); }
  .my-dot { width:40px; height:40px; background:#3B82F6; border-radius:50%; border:5px solid #fff; box-shadow:0 0 20px rgba(59,130,246,0.8); }
  .my-pulse { position:absolute; top:-24px; left:-24px; width:88px; height:88px; border:2px solid #3B82F6; border-radius:50%; opacity:0.5; animation:pulse 2s infinite; }
  @keyframes pulse { 0%{transform:scale(1);opacity:0.5} 100%{transform:scale(1.5);opacity:0} }
  .map-user { position:absolute; }
  .u1 { top:20%; left:25%; }
  .u2 { top:30%; left:68%; }
  .u3 { top:60%; left:40%; }
  .user-pin { font-size:30px; }
  .map-label { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(10,20,50,0.9); border-radius:12px; padding:12px 24px; font-size:22px; color:#10b981; border:1px solid #10b981; }

  /* status bar */
  .status-pill { margin:0 40px 28px; display:flex; gap:20px; }
  .pill { flex:1; border-radius:20px; padding:22px; text-align:center; }
  .pill-active { background:#0a2a1a; border:2px solid #10b981; }
  .pill-waiting { background:#0a1f3a; border:2px solid #3B82F6; }
  .pill-val { font-size:32px; font-weight:800; }
  .pill-active .pill-val { color:#10b981; }
  .pill-waiting .pill-val { color:#3B82F6; }
  .pill-label { font-size:20px; margin-top:6px; }
  .pill-active .pill-label { color:#6ee7b7; }
  .pill-waiting .pill-label { color:#93c5fd; }

  /* quick actions */
  .quick-title { font-size:28px; color:#8899bb; margin:0 40px 20px; font-weight:600; }
  .quick-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin:0 40px; }
  .quick-card { background:#0f1b3d; border-radius:20px; padding:28px; text-align:center; border:1px solid #162040; cursor:pointer; }
  .quick-icon { font-size:48px; margin-bottom:12px; display:block; }
  .quick-name { font-size:22px; color:#fff; font-weight:600; }

  .bottom-nav { position:absolute; bottom:0; left:0; right:0; background:#060e22; height:120px; display:flex; align-items:center; justify-content:space-around; border-top:1px solid #0f1b3d; }
  .nav-item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .nav-icon { font-size:38px; }
  .nav-label { font-size:18px; color:#8899bb; }
  .nav-item.active .nav-label { color:#3B82F6; }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="status-time">8:00</span>
    <div class="status-icons">●●●● 🔋</div>
  </div>

  <div class="header">
    <div class="brand">
      <div class="brand-name">J<span>A</span>GO</div>
      <div class="brand-tag">PILOT</div>
    </div>
    <div class="online-toggle">
      <div class="toggle-dot"></div>
      <div class="toggle-text">ONLINE</div>
    </div>
  </div>

  <div class="earnings-card">
    <div class="earn-header">
      <div class="earn-title">Today's Earnings</div>
      <div class="earn-date">Mon, 8 Mar 2026</div>
    </div>
    <div class="earn-amount">₹ 640</div>
    <div class="earn-sub">↑ ₹120 more than yesterday</div>
    <div class="earn-stats">
      <div class="earn-stat">
        <div class="earn-stat-val">12</div>
        <div class="earn-stat-label">Rides</div>
      </div>
      <div class="earn-stat">
        <div class="earn-stat-val">48</div>
        <div class="earn-stat-label">km driven</div>
      </div>
      <div class="earn-stat">
        <div class="earn-stat-val">4.9⭐</div>
        <div class="earn-stat-label">Rating</div>
      </div>
    </div>
  </div>

  <div class="map-area">
    <div class="map-content">
      <div class="road-h" style="top:30%"></div>
      <div class="road-h" style="top:60%"></div>
      <div class="road-h" style="top:90%"></div>
      <div class="road-v" style="left:25%"></div>
      <div class="road-v" style="left:55%"></div>
      <div class="road-v" style="left:80%"></div>
    </div>
    <div class="my-location">
      <div class="my-pulse"></div>
      <div class="my-dot"></div>
    </div>
    <div class="map-user u1"><span class="user-pin">📍</span></div>
    <div class="map-user u2"><span class="user-pin">📍</span></div>
    <div class="map-user u3"><span class="user-pin">📍</span></div>
    <div class="map-label">🟢 3 customers nearby</div>
  </div>

  <div class="status-pill">
    <div class="pill pill-active">
      <div class="pill-val">ONLINE</div>
      <div class="pill-label">Accepting rides</div>
    </div>
    <div class="pill pill-waiting">
      <div class="pill-val">Waiting</div>
      <div class="pill-label">For next request</div>
    </div>
  </div>

  <div class="quick-title">Quick Actions</div>
  <div class="quick-grid">
    <div class="quick-card">
      <span class="quick-icon">📊</span>
      <div class="quick-name">Earnings</div>
    </div>
    <div class="quick-card">
      <span class="quick-icon">🧾</span>
      <div class="quick-name">Trip History</div>
    </div>
    <div class="quick-card">
      <span class="quick-icon">⚙️</span>
      <div class="quick-name">Settings</div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active"><span class="nav-icon">🏠</span><span class="nav-label" style="color:#3B82F6;">Home</span></div>
    <div class="nav-item"><span class="nav-icon">🕐</span><span class="nav-label">Trips</span></div>
    <div class="nav-item"><span class="nav-icon">💰</span><span class="nav-label">Earnings</span></div>
    <div class="nav-item"><span class="nav-icon">👤</span><span class="nav-label">Profile</span></div>
  </div>
</body>
</html>
