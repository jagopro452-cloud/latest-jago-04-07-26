<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1920px; background:#060e22; font-family:'Segoe UI',Arial,sans-serif; overflow:hidden; position:relative; }
  .status-bar { height:60px; background:#060e22; display:flex; align-items:center; justify-content:space-between; padding:0 40px; }
  .status-time { color:#fff; font-size:28px; font-weight:600; }
  .status-icons { color:#fff; font-size:22px; }

  /* nav bar */
  .nav-map { background:#0a1428; padding:24px 40px; display:flex; align-items:center; gap:20px; border-bottom:1px solid #162040; }
  .nav-back { width:64px; height:64px; background:#162040; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; }
  .nav-title { font-size:30px; color:#fff; font-weight:700; flex:1; }
  .nav-badge { background:#0a2a1a; border:2px solid #10b981; border-radius:16px; padding:12px 24px; font-size:22px; color:#10b981; font-weight:700; }

  /* map */
  .map-area { height:680px; background:linear-gradient(180deg,#0f2050,#1a3a6b); position:relative; overflow:hidden; }
  .map-bg { position:absolute; inset:0; opacity:0.12; }
  .road-h { position:absolute; height:3px; background:#6aabff; width:100%; }
  .road-v { position:absolute; width:3px; background:#6aabff; height:100%; }
  /* route with turns */
  .route-seg1 { position:absolute; top:30%; left:20%; width:35%; height:4px; background:#3B82F6; border-radius:4px; }
  .route-seg2 { position:absolute; top:30%; left:55%; width:4px; height:25%; background:#3B82F6; border-radius:4px; }
  .route-seg3 { position:absolute; top:55%; left:55%; width:15%; height:4px; background:#3B82F6; border-radius:4px; }
  .turn-arrow { position:absolute; top:23%; left:51%; font-size:36px; color:#fff; filter:drop-shadow(0 2px 6px #3B82F6); }
  .dest-flag { position:absolute; top:48%; left:69%; font-size:52px; }
  /* driver */
  .driver-pos { position:absolute; top:24%; left:16%; font-size:56px; filter:drop-shadow(0 0 12px rgba(59,130,246,0.9)); }

  /* instruction bar */
  .instruction { position:absolute; top:20px; left:20px; right:20px; background:rgba(10,20,50,0.95); border-radius:20px; padding:24px 32px; display:flex; align-items:center; gap:20px; border:2px solid #3B82F6; backdrop-filter:blur(8px); }
  .inst-arrow { width:64px; height:64px; background:#3B82F6; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:36px; flex-shrink:0; }
  .inst-text { flex:1; }
  .inst-action { font-size:30px; color:#fff; font-weight:700; }
  .inst-road { font-size:22px; color:#93c5fd; margin-top:4px; }
  .inst-dist { font-size:36px; color:#fff; font-weight:900; }

  /* eta strip */
  .eta-strip { position:absolute; bottom:8px; left:20px; right:20px; background:rgba(10,20,50,0.9); border-radius:16px; padding:16px 28px; display:flex; align-items:center; justify-content:space-between; }
  .eta-item { text-align:center; }
  .eta-val { font-size:32px; color:#fff; font-weight:800; }
  .eta-label { font-size:18px; color:#8899bb; margin-top:4px; }
  .eta-divider { width:2px; height:48px; background:#162040; }

  /* panel */
  .panel { background:#0a1428; border-radius:32px 32px 0 0; padding:36px 40px; position:relative; }
  .handle { width:80px; height:6px; background:#243060; border-radius:3px; margin:0 auto 32px; }

  /* rider card */
  .rider-strip { display:flex; align-items:center; gap:24px; background:#0f1b3d; border-radius:20px; padding:28px; margin-bottom:24px; border:1px solid #162040; }
  .rider-av { width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg,#1d4ed8,#3B82F6); display:flex; align-items:center; justify-content:center; font-size:38px; color:#fff; font-weight:700; border:3px solid #3B82F6; flex-shrink:0; }
  .rider-name { font-size:30px; color:#fff; font-weight:700; }
  .rider-dest { font-size:22px; color:#8899bb; margin-top:6px; }
  .rider-actions { display:flex; gap:12px; margin-left:auto; }
  .ract { width:64px; height:64px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; border:none; cursor:pointer; }
  .ract-call { background:#0a2a1a; border:2px solid #10b981; }
  .ract-msg { background:#0a1a3a; border:2px solid #3B82F6; }

  /* action buttons */
  .on-trip { display:flex; gap:20px; margin-bottom:24px; }
  .btn-arrived { flex:1; background:#0a2a1a; border:3px solid #10b981; color:#10b981; border-radius:20px; padding:28px; font-size:30px; font-weight:700; cursor:pointer; }
  .btn-emergency { background:#2a0a0a; border:3px solid #ef4444; color:#ef4444; border-radius:20px; padding:28px; font-size:28px; font-weight:700; cursor:pointer; width:120px; }

  /* start ride */
  .start-btn { background:linear-gradient(135deg,#10b981,#059669); color:#fff; border:none; border-radius:20px; padding:36px; font-size:36px; font-weight:700; width:100%; cursor:pointer; box-shadow:0 8px 24px rgba(16,185,129,0.4); }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="status-time">9:48</span>
    <div class="status-icons">●●●● 🔋</div>
  </div>

  <div class="nav-map">
    <div class="nav-back">←</div>
    <div class="nav-title">Navigating to Pickup</div>
    <div class="nav-badge">🟢 En Route</div>
  </div>

  <div class="map-area">
    <div class="map-bg">
      <div class="road-h" style="top:20%"></div>
      <div class="road-h" style="top:40%"></div>
      <div class="road-h" style="top:60%"></div>
      <div class="road-h" style="top:80%"></div>
      <div class="road-v" style="left:25%"></div>
      <div class="road-v" style="left:55%"></div>
      <div class="road-v" style="left:75%"></div>
    </div>
    <div class="route-seg1"></div>
    <div class="route-seg2"></div>
    <div class="route-seg3"></div>
    <div class="turn-arrow">↑</div>
    <div class="dest-flag">🏁</div>
    <div class="driver-pos">🛺</div>

    <div class="instruction">
      <div class="inst-arrow">↑</div>
      <div class="inst-text">
        <div class="inst-action">Go straight on</div>
        <div class="inst-road">Hitech City Main Road</div>
      </div>
      <div class="inst-dist">600 m</div>
    </div>

    <div class="eta-strip">
      <div class="eta-item">
        <div class="eta-val">3 min</div>
        <div class="eta-label">to pickup</div>
      </div>
      <div class="eta-divider"></div>
      <div class="eta-item">
        <div class="eta-val">0.8 km</div>
        <div class="eta-label">remaining</div>
      </div>
      <div class="eta-divider"></div>
      <div class="eta-item">
        <div class="eta-val">42 km/h</div>
        <div class="eta-label">speed</div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="handle"></div>

    <div class="rider-strip">
      <div class="rider-av">P</div>
      <div>
        <div class="rider-name">Priya Sharma</div>
        <div class="rider-dest">📍 HITEC City, Cyber Towers</div>
      </div>
      <div class="rider-actions">
        <button class="ract ract-call">📞</button>
        <button class="ract ract-msg">💬</button>
      </div>
    </div>

    <div class="on-trip">
      <button class="btn-arrived">✅ Arrived at Pickup</button>
      <button class="btn-emergency">🆘</button>
    </div>

    <button class="start-btn">🚦 &nbsp; Start Ride (enter OTP)</button>
  </div>
</body>
</html>
