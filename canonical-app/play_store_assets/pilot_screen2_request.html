<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1920px; background:#060814; font-family:'Segoe UI',Arial,sans-serif; overflow:hidden; position:relative; }
  .status-bar { height:60px; background:#060814; display:flex; align-items:center; justify-content:space-between; padding:0 40px; }
  .status-time { color:#fff; font-size:28px; font-weight:600; }
  .status-icons { color:#fff; font-size:22px; }

  /* alert banner */
  .alert-banner { background:linear-gradient(135deg,#1a0a00,#2a1200); padding:24px 40px; display:flex; align-items:center; gap:20px; border-bottom:3px solid #f59e0b; }
  .alert-text { font-size:24px; color:#f59e0b; font-weight:700; animation:flash 1s infinite; }
  @keyframes flash { 0%,100%{opacity:1}50%{opacity:0.6} }
  .alert-icon { font-size:40px; }

  /* map */
  .map-area { height:560px; background:linear-gradient(180deg,#0f1a3a,#1a2f60); position:relative; overflow:hidden; }
  .map-bg { position:absolute; inset:0; opacity:0.12; }
  .road-h { position:absolute; height:3px; background:#6aabff; width:100%; }
  .road-v { position:absolute; width:3px; background:#6aabff; height:100%; }
  .pickup-pin { position:absolute; top:30%; left:40%; transform:translate(-50%,-100%); font-size:56px; }
  .driver-pin { position:absolute; top:55%; left:60%; font-size:52px; filter:drop-shadow(0 0 12px rgba(59,130,246,0.8)); }
  .route-line { position:absolute; top:38%; left:43%; width:22%; height:3px; background:#3B82F6; border-radius:3px; transform:rotate(-18deg); }
  .distance-bubble { position:absolute; top:15%; left:50%; transform:translateX(-50%); background:rgba(10,20,50,0.95); border-radius:16px; padding:16px 28px; font-size:24px; color:#fff; font-weight:700; border:2px solid #3B82F6; }

  /* main card */
  .request-card { background:#0a1428; border-radius:40px 40px 0 0; padding:40px; margin-top:-20px; position:relative; }
  .handle { width:80px; height:6px; background:#162040; border-radius:3px; margin:0 auto 32px; }

  /* rider info */
  .rider-row { display:flex; align-items:center; gap:28px; margin-bottom:32px; }
  .rider-avatar { width:100px; height:100px; border-radius:50%; background:linear-gradient(135deg,#1d4ed8,#3B82F6); display:flex; align-items:center; justify-content:center; font-size:44px; color:#fff; font-weight:700; border:4px solid #3B82F6; flex-shrink:0; }
  .rider-info { flex:1; }
  .rider-name { font-size:36px; color:#fff; font-weight:700; }
  .rider-rating { font-size:24px; color:#f59e0b; margin-top:6px; }
  .rider-trips { font-size:22px; color:#8899bb; margin-top:4px; }
  .fare-big { text-align:right; }
  .fare-amount { font-size:56px; color:#fff; font-weight:900; }
  .fare-type { font-size:22px; color:#8899bb; margin-top:4px; }

  /* route details */
  .route-card { background:#0f1b3d; border-radius:20px; padding:28px; margin-bottom:28px; border:1px solid #162040; }
  .route-row { display:flex; align-items:flex-start; gap:20px; padding:14px 0; border-bottom:1px solid #162040; }
  .route-row:last-child { border-bottom:none; }
  .route-dot { width:20px; height:20px; border-radius:50%; flex-shrink:0; margin-top:6px; }
  .dot-blue { background:#3B82F6; }
  .dot-red { background:#ef4444; }
  .route-addr { }
  .route-addr-label { font-size:20px; color:#8899bb; }
  .route-addr-val { font-size:28px; color:#fff; font-weight:600; margin-top:4px; }
  .route-badges { display:flex; gap:16px; margin-top:28px; }
  .route-badge { background:#162040; border-radius:16px; padding:12px 24px; font-size:22px; color:#3B82F6; font-weight:700; border:1px solid #243060; }

  /* payment */
  .payment-info { display:flex; align-items:center; gap:20px; background:#0f1b3d; border-radius:20px; padding:24px 32px; margin-bottom:32px; border:1px solid #162040; }
  .pay-icon { font-size:40px; }
  .pay-text { font-size:26px; color:#fff; font-weight:600; }
  .pay-sub { font-size:20px; color:#8899bb; margin-top:4px; }

  /* timer */
  .timer-bar { background:#0f1b3d; border-radius:20px; padding:24px; margin-bottom:28px; border:1px solid #162040; }
  .timer-label { font-size:22px; color:#8899bb; text-align:center; margin-bottom:12px; }
  .timer-track { background:#162040; border-radius:8px; height:16px; overflow:hidden; }
  .timer-fill { height:100%; background:linear-gradient(90deg,#ef4444,#f59e0b); border-radius:8px; width:65%; }
  .timer-count { font-size:32px; color:#f59e0b; text-align:center; margin-top:12px; font-weight:700; }

  /* buttons */
  .btn-row { display:flex; gap:20px; }
  .btn-decline { flex:1; background:transparent; border:3px solid #ef4444; color:#ef4444; border-radius:20px; padding:32px; font-size:34px; font-weight:700; cursor:pointer; }
  .btn-accept { flex:2; background:linear-gradient(135deg,#10b981,#059669); color:#fff; border:none; border-radius:20px; padding:32px; font-size:36px; font-weight:700; cursor:pointer; box-shadow:0 8px 32px rgba(16,185,129,0.4); }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="status-time">9:43</span>
    <div class="status-icons">●●●● 🔋</div>
  </div>

  <div class="alert-banner">
    <span class="alert-icon">🔔</span>
    <span class="alert-text">NEW RIDE REQUEST — TAP TO RESPOND!</span>
  </div>

  <div class="map-area">
    <div class="map-bg">
      <div class="road-h" style="top:25%"></div>
      <div class="road-h" style="top:55%"></div>
      <div class="road-h" style="top:80%"></div>
      <div class="road-v" style="left:25%"></div>
      <div class="road-v" style="left:55%"></div>
      <div class="road-v" style="left:80%"></div>
    </div>
    <div class="pickup-pin">📍</div>
    <div class="driver-pin">🛺</div>
    <div class="route-line"></div>
    <div class="distance-bubble">📏 0.8 km to pickup</div>
  </div>

  <div class="request-card">
    <div class="handle"></div>

    <div class="rider-row">
      <div class="rider-avatar">P</div>
      <div class="rider-info">
        <div class="rider-name">Priya Sharma</div>
        <div class="rider-rating">⭐ 4.8 · Regular rider</div>
        <div class="rider-trips">42 trips with JAGO</div>
      </div>
      <div class="fare-big">
        <div class="fare-amount">₹58</div>
        <div class="fare-type">Cash</div>
      </div>
    </div>

    <div class="route-card">
      <div class="route-row">
        <div class="route-dot dot-blue"></div>
        <div class="route-addr">
          <div class="route-addr-label">Pickup</div>
          <div class="route-addr-val">Madhapur, Near Forum Mall</div>
        </div>
      </div>
      <div class="route-row">
        <div class="route-dot dot-red"></div>
        <div class="route-addr">
          <div class="route-addr-label">Drop</div>
          <div class="route-addr-val">HITEC City, Cyber Towers</div>
        </div>
      </div>
      <div class="route-badges">
        <div class="route-badge">📏 2.8 km</div>
        <div class="route-badge">⏱️ ~9 min</div>
        <div class="route-badge">💵 ₹58</div>
      </div>
    </div>

    <div class="payment-info">
      <span class="pay-icon">💵</span>
      <div>
        <div class="pay-text">Cash Payment</div>
        <div class="pay-sub">Collect ₹58 from rider</div>
      </div>
    </div>

    <div class="timer-bar">
      <div class="timer-label">Auto-decline in</div>
      <div class="timer-track"><div class="timer-fill"></div></div>
      <div class="timer-count">13 seconds</div>
    </div>

    <div class="btn-row">
      <button class="btn-decline">✕ Decline</button>
      <button class="btn-accept">✓ Accept Ride</button>
    </div>
  </div>
</body>
</html>
