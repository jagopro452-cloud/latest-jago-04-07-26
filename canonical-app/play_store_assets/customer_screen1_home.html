<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1920px; background:#0f1b3d; font-family:'Segoe UI',Arial,sans-serif; overflow:hidden; position:relative; }
  .status-bar { height:60px; background:#0a1428; display:flex; align-items:center; justify-content:space-between; padding:0 40px; }
  .status-time { color:#fff; font-size:28px; font-weight:600; }
  .status-icons { display:flex; gap:16px; align-items:center; }
  .status-icon { color:#fff; font-size:22px; }

  /* Top bar */
  .topbar { background:#0a1428; padding:24px 40px 20px; display:flex; align-items:center; justify-content:space-between; }
  .logo-text { display:flex; flex-direction:column; }
  .logo-brand { font-size:42px; font-weight:900; color:#fff; letter-spacing:2px; }
  .logo-brand span { color:#3B82F6; }
  .logo-sub { font-size:20px; color:#8899bb; font-style:italic; }
  .greeting { font-size:26px; color:#8899bb; }
  .user-avatar { width:72px; height:72px; border-radius:50%; background:linear-gradient(135deg,#3B82F6,#1e40af); display:flex; align-items:center; justify-content:center; font-size:32px; color:#fff; font-weight:700; }

  /* Location bar */
  .location-bar { margin:24px 40px; background:#162040; border-radius:20px; padding:24px 32px; display:flex; align-items:center; gap:20px; border:1px solid #243060; }
  .loc-dot { width:20px; height:20px; background:#3B82F6; border-radius:50%; flex-shrink:0; }
  .loc-text { flex:1; }
  .loc-label { font-size:20px; color:#8899bb; }
  .loc-value { font-size:30px; color:#fff; font-weight:600; margin-top:4px; }
  .loc-change { font-size:22px; color:#3B82F6; font-weight:600; }

  /* Map area */
  .map-area { height:700px; position:relative; overflow:hidden; background:linear-gradient(180deg,#0f2050 0%,#1a3a6b 50%,#0f2050 100%); }
  .map-grid { position:absolute; inset:0; opacity:0.15; }
  .road-h { position:absolute; height:3px; background:#4a90d9; width:100%; }
  .road-v { position:absolute; width:3px; background:#4a90d9; height:100%; }
  .map-pin { position:absolute; top:35%; left:50%; transform:translate(-50%,-100%); }
  .pin-circle { width:50px; height:50px; background:#3B82F6; border-radius:50% 50% 50% 0; transform:rotate(-45deg); display:flex; align-items:center; justify-content:center; box-shadow:0 8px 24px rgba(59,130,246,0.6); }
  .pin-inner { width:20px; height:20px; background:#fff; border-radius:50%; transform:rotate(45deg); }
  .map-pulse { position:absolute; top:35%; left:50%; transform:translate(-50%,-50%); width:100px; height:100px; border-radius:50%; background:rgba(59,130,246,0.2); animation:pulse 2s infinite; }
  @keyframes pulse { 0%{transform:translate(-50%,-50%) scale(1);opacity:0.8} 100%{transform:translate(-50%,-50%) scale(2);opacity:0} }
  .driver-dot { position:absolute; width:44px; height:44px; }
  .d1 { top:20%; left:30%; }
  .d2 { top:25%; left:65%; }
  .d3 { top:55%; left:45%; }
  .auto-icon { width:44px; height:44px; background:#1e3a7b; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:24px; border:2px solid #3B82F6; }

  /* Vehicles */
  .vehicles-panel { background:#0a1428; border-radius:32px 32px 0 0; padding:36px 40px; margin-top:-20px; position:relative; z-index:10; }
  .panel-handle { width:80px; height:6px; background:#243060; border-radius:3px; margin:0 auto 32px; }
  .panel-title { font-size:30px; font-weight:700; color:#fff; margin-bottom:24px; }
  .vehicles-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:32px; }
  .vehicle-card { background:#162040; border-radius:20px; padding:24px 10px; text-align:center; border:2px solid transparent; cursor:pointer; }
  .vehicle-card.active { border-color:#3B82F6; background:#1a2d5a; }
  .vehicle-emoji { font-size:44px; margin-bottom:10px; display:block; }
  .vehicle-name { font-size:22px; color:#fff; font-weight:600; }
  .vehicle-eta { font-size:18px; color:#3B82F6; margin-top:4px; }
  .book-btn { background:linear-gradient(135deg,#3B82F6,#1d4ed8); color:#fff; border:none; border-radius:20px; padding:32px; font-size:34px; font-weight:700; width:100%; cursor:pointer; letter-spacing:1px; box-shadow:0 8px 32px rgba(59,130,246,0.4); }

  /* Bottom nav */
  .bottom-nav { position:absolute; bottom:0; left:0; right:0; background:#0a1428; height:120px; display:flex; align-items:center; justify-content:space-around; border-top:1px solid #162040; }
  .nav-item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .nav-icon { font-size:38px; }
  .nav-label { font-size:18px; color:#8899bb; }
  .nav-item.active .nav-icon { filter:drop-shadow(0 0 8px #3B82F6); }
  .nav-item.active .nav-label { color:#3B82F6; }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <span>●●●●</span>
      <span>WiFi</span>
      <span>🔋</span>
    </div>
  </div>

  <div class="topbar">
    <div class="logo-text">
      <div class="logo-brand">J<span>A</span>GO</div>
      <div class="logo-sub">Move Smarter.</div>
    </div>
    <div class="greeting">Good morning, Rahul 👋</div>
    <div class="user-avatar">R</div>
  </div>

  <div class="location-bar">
    <div class="loc-dot"></div>
    <div class="loc-text">
      <div class="loc-label">Your location</div>
      <div class="loc-value">Madhapur, Hyderabad</div>
    </div>
    <div class="loc-change">Change</div>
  </div>

  <div class="map-area">
    <div class="map-grid">
      <div class="road-h" style="top:20%"></div>
      <div class="road-h" style="top:40%"></div>
      <div class="road-h" style="top:60%"></div>
      <div class="road-h" style="top:80%"></div>
      <div class="road-v" style="left:25%"></div>
      <div class="road-v" style="left:50%"></div>
      <div class="road-v" style="left:75%"></div>
    </div>
    <div class="map-pulse"></div>
    <div class="map-pin">
      <div class="pin-circle"><div class="pin-inner"></div></div>
    </div>
    <div class="driver-dot d1"><div class="auto-icon">🛺</div></div>
    <div class="driver-dot d2"><div class="auto-icon">🚗</div></div>
    <div class="driver-dot d3"><div class="auto-icon">🛺</div></div>
  </div>

  <div class="vehicles-panel">
    <div class="panel-handle"></div>
    <div class="panel-title">Where do you want to go?</div>
    <div class="vehicles-grid">
      <div class="vehicle-card active">
        <span class="vehicle-emoji">🛺</span>
        <div class="vehicle-name">Auto</div>
        <div class="vehicle-eta">3 min</div>
      </div>
      <div class="vehicle-card">
        <span class="vehicle-emoji">🚗</span>
        <div class="vehicle-name">Mini</div>
        <div class="vehicle-eta">5 min</div>
      </div>
      <div class="vehicle-card">
        <span class="vehicle-emoji">📦</span>
        <div class="vehicle-name">Parcel</div>
        <div class="vehicle-eta">8 min</div>
      </div>
      <div class="vehicle-card">
        <span class="vehicle-emoji">🚛</span>
        <div class="vehicle-name">Cargo</div>
        <div class="vehicle-eta">12 min</div>
      </div>
    </div>
    <button class="book-btn">🔍 &nbsp; Search a destination</button>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Home</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">🕐</span>
      <span class="nav-label">Rides</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">💰</span>
      <span class="nav-label">Wallet</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">👤</span>
      <span class="nav-label">Profile</span>
    </div>
  </div>
</body>
</html>
