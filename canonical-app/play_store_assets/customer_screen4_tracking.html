<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1920px; background:#060e22; font-family:'Segoe UI',Arial,sans-serif; overflow:hidden; position:relative; }
  .status-bar { height:60px; background:#060e22; display:flex; align-items:center; justify-content:space-between; padding:0 40px; }
  .status-time { color:#fff; font-size:28px; font-weight:600; }
  .status-icons { color:#fff; font-size:22px; }

  /* live map */
  .map-live { height:780px; background:linear-gradient(180deg,#0f2050 0%,#122a5e 50%,#0f1e47 100%); position:relative; overflow:hidden; }
  .map-bg { position:absolute; inset:0; opacity:0.12; }
  .road-h { position:absolute; height:3px; background:#6aabff; width:100%; }
  .road-v { position:absolute; width:3px; background:#6aabff; height:100%; }
  /* route path */
  .route-path { position:absolute; top:30%; left:25%; width:55%; height:4px; background:linear-gradient(90deg,#3B82F6,#60a5fa); border-radius:4px; }
  .route-path::before { content:''; position:absolute; left:-8px; top:-8px; width:20px; height:20px; background:#3B82F6; border-radius:50%; border:4px solid #fff; box-shadow:0 0 16px #3B82F6; }
  .dest-pin { position:absolute; top:20%; right:18%; font-size:48px; }
  /* animated driver */
  .driver-car { position:absolute; top:34%; left:35%; }
  .driver-car-icon { font-size:52px; filter:drop-shadow(0 0 12px rgba(59,130,246,0.8)); }
  .driver-trail { position:absolute; top:32%; left:20%; width:18%; height:3px; background:linear-gradient(90deg,rgba(59,130,246,0),#3B82F6); border-radius:3px; }
  .eta-bubble { position:absolute; top:10%; left:50%; transform:translateX(-50%); background:rgba(10,20,50,0.95); border-radius:20px; padding:20px 36px; display:flex; align-items:center; gap:16px; border:2px solid #3B82F6; backdrop-filter:blur(8px); }
  .eta-text { font-size:28px; color:#fff; font-weight:700; }
  .eta-time { font-size:36px; color:#3B82F6; font-weight:900; }

  /* panel */
  .panel { background:#0a1428; border-radius:40px 40px 0 0; padding:36px 40px; margin-top:-24px; position:relative; z-index:10; }
  .handle { width:80px; height:6px; background:#243060; border-radius:3px; margin:0 auto 32px; }

  /* status badge */
  .status-badge { background:#0a2a1a; border:2px solid #10b981; border-radius:20px; padding:16px 28px; display:inline-flex; align-items:center; gap:12px; margin-bottom:32px; }
  .status-dot { width:16px; height:16px; background:#10b981; border-radius:50%; animation:blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .status-text { font-size:26px; color:#10b981; font-weight:700; }

  /* driver card */
  .driver-card { background:#0f1b3d; border-radius:24px; padding:32px; display:flex; align-items:center; gap:28px; margin-bottom:28px; border:1px solid #162040; }
  .driver-avatar { width:100px; height:100px; border-radius:50%; background:linear-gradient(135deg,#1d4ed8,#3B82F6); display:flex; align-items:center; justify-content:center; font-size:44px; color:#fff; font-weight:700; border:4px solid #3B82F6; flex-shrink:0; }
  .driver-info { flex:1; }
  .driver-name { font-size:32px; color:#fff; font-weight:700; }
  .driver-rating { font-size:22px; color:#f59e0b; margin-top:6px; }
  .driver-vehicle { font-size:22px; color:#8899bb; margin-top:6px; }
  .driver-actions { display:flex; gap:16px; }
  .action-btn { width:72px; height:72px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:32px; border:none; cursor:pointer; }
  .call-btn { background:#0a2a1a; border:2px solid #10b981; }
  .msg-btn { background:#0a1a3a; border:2px solid #3B82F6; }

  /* otp card */
  .otp-card { background:#0f1b3d; border-radius:24px; padding:28px 32px; display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; border:1px solid #162040; }
  .otp-label { font-size:24px; color:#8899bb; }
  .otp-code { font-size:52px; color:#fff; font-weight:900; letter-spacing:12px; }
  .otp-hint { font-size:20px; color:#8899bb; margin-top:6px; }

  /* trip details */
  .trip-details { background:#0f1b3d; border-radius:24px; padding:28px 32px; margin-bottom:28px; border:1px solid #162040; }
  .trip-row { display:flex; justify-content:space-between; padding:14px 0; border-bottom:1px solid #162040; }
  .trip-row:last-child { border-bottom:none; }
  .trip-key { font-size:24px; color:#8899bb; }
  .trip-val { font-size:24px; color:#fff; font-weight:600; }
  .trip-val.blue { color:#3B82F6; }

  /* cancel */
  .cancel-btn { width:100%; border:2px solid #ef4444; background:transparent; color:#ef4444; border-radius:20px; padding:28px; font-size:28px; font-weight:600; cursor:pointer; }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="status-time">9:47</span>
    <div class="status-icons">●●●● 🔋</div>
  </div>

  <div class="map-live">
    <div class="map-bg">
      <div class="road-h" style="top:20%"></div>
      <div class="road-h" style="top:40%"></div>
      <div class="road-h" style="top:60%"></div>
      <div class="road-h" style="top:80%"></div>
      <div class="road-v" style="left:25%"></div>
      <div class="road-v" style="left:50%"></div>
      <div class="road-v" style="left:75%"></div>
    </div>
    <div class="route-path"></div>
    <div class="driver-trail"></div>
    <div class="dest-pin">📍</div>
    <div class="driver-car"><div class="driver-car-icon">🛺</div></div>
    <div class="eta-bubble">
      <div class="eta-text">Driver arriving in</div>
      <div class="eta-time">3 min</div>
    </div>
  </div>

  <div class="panel">
    <div class="handle"></div>

    <div class="status-badge">
      <div class="status-dot"></div>
      <div class="status-text">Driver is on the way</div>
    </div>

    <div class="driver-card">
      <div class="driver-avatar">R</div>
      <div class="driver-info">
        <div class="driver-name">Ravi Kumar</div>
        <div class="driver-rating">⭐ 4.9 · 1,234 trips</div>
        <div class="driver-vehicle">🛺 AP 28 TG 5678 · Green Auto</div>
      </div>
      <div class="driver-actions">
        <button class="action-btn call-btn">📞</button>
        <button class="action-btn msg-btn">💬</button>
      </div>
    </div>

    <div class="otp-card">
      <div>
        <div class="otp-label">Share OTP to start ride</div>
        <div class="otp-code">4 7 2 1</div>
        <div class="otp-hint">Tell this to your driver</div>
      </div>
      <div style="font-size:60px;">🔒</div>
    </div>

    <div class="trip-details">
      <div class="trip-row">
        <span class="trip-key">📍 Pickup</span>
        <span class="trip-val">Madhapur</span>
      </div>
      <div class="trip-row">
        <span class="trip-key">🏁 Drop</span>
        <span class="trip-val">HITEC City</span>
      </div>
      <div class="trip-row">
        <span class="trip-key">📏 Distance</span>
        <span class="trip-val">2.8 km</span>
      </div>
      <div class="trip-row">
        <span class="trip-key">💵 Fare</span>
        <span class="trip-val blue">₹58 (estimated)</span>
      </div>
    </div>

    <button class="cancel-btn">✕ &nbsp; Cancel Ride</button>
  </div>
</body>
</html>
