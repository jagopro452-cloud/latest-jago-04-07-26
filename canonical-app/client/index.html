<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary SEO -->
    <title>JAGO — Book Rides, Parcels &amp; Intercity Travel | India's Smart Mobility Platform</title>
    <meta name="description" content="JAGO Pro is India's smart ride-hailing platform. Book bike taxi, auto, cab, intercity travel, parcel delivery and car sharing instantly. Verified pilots, real-time tracking, fair fares — no surge pricing." />
    <meta name="keywords" content="JAGO Pro, ride booking, bike taxi, cab booking, auto ride, parcel delivery, intercity travel, car sharing, outstation taxi, driver app, ride hailing India, verified drivers, GPS tracking, online booking" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="JAGO Pro Mobility Pvt Ltd" />
    <link rel="canonical" href="https://jago.in/" />

    <!-- Open Graph (Facebook / WhatsApp / LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="JAGO Pro" />
    <meta property="og:title" content="JAGO Pro — Book Rides, Parcels &amp; Intercity Travel" />
    <meta property="og:description" content="Book bike taxi, auto, cab, intercity travel, parcels and car sharing instantly. Verified pilots, real-time tracking, fair fares across India." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://jago.in/" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@JAGOPro" />
    <meta name="twitter:title" content="JAGO Pro — Book Rides, Parcels &amp; Intercity Travel" />
    <meta name="twitter:description" content="India's smart mobility platform. Bike taxi, auto, cab, parcel delivery, car sharing — all in one app." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- PWA / Mobile App -->
    <meta name="theme-color" content="#c86bff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="JAGO Pro" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Structured Data — LocalBusiness + MobileApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "name": "JAGO Pro",
          "url": "https://jago.in",
          "logo": "https://jago.in/favicon.png",
          "description": "India's smart ride-hailing and mobility platform",
          "sameAs": ["https://twitter.com/JagoMobility"]
        },
        {
          "@type": "MobileApplication",
          "name": "JAGO Pro Customer App",
          "operatingSystem": "ANDROID, IOS",
          "applicationCategory": "TravelApplication",
          "offers": { "@type": "Offer", "price": "0", "priceCurrency": "INR" },
          "aggregateRating": { "@type": "AggregateRating", "ratingValue": "4.8", "ratingCount": "1200" }
        }
      ]
    }
    </script>

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
